services:

  postgres:
    image: postgres:15
    container_name: fiap_postgres
    environment:
      POSTGRES_USER: fiap
      POSTGRES_PASSWORD: fiap123
      POSTGRES_DB: secure_systems
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fiap_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: fiap
      RABBITMQ_DEFAULT_PASS: fiap123

  api-gateway:
    build: .
    container_name: api_gateway
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - rabbitmq

  worker:
    build: .
    container_name: ia_worker
    command: python -m app.workers.ia_worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - rabbitmq

volumes:
  pgdata: